<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GLB Name Test</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, system-ui, sans-serif; background: #0f1115; color: #e6e8ec; overflow: hidden; }
  #app { display: flex; height: 100vh; }
  #scene { flex: 1; position: relative; }
  #hint { position: absolute; bottom: 12px; left: 12px; font-size: 12px; color: #7a8090; }
  #status { position: absolute; top: 12px; left: 12px; font-size: 13px; color: #9fb0ff; background: #161922cc; padding: 6px 10px; border-radius: 6px; }
  #side { width: 320px; background: #161922; display: flex; flex-direction: column; border-left: 1px solid #262b38; }
  #side h2 { font-size: 13px; text-transform: uppercase; letter-spacing: .08em; color: #8b93a7; padding: 14px 16px; border-bottom: 1px solid #262b38; }
  #names { flex: 1; overflow-y: auto; padding: 10px 16px; font-size: 13px; }
  #names div { padding: 4px 0; cursor: pointer; border-bottom: 1px solid #1d212c; }
  #names div:hover { color: #ffd23f; }
  #inputrow { display: flex; padding: 12px; gap: 8px; border-top: 1px solid #262b38; }
  #inputrow input { flex: 1; background: #0f1115; border: 1px solid #2c3242; color: #e6e8ec; padding: 10px 12px; border-radius: 8px; font-size: 14px; outline: none; }
  #inputrow button { background: #2f6df4; color: #fff; border: none; padding: 0 16px; border-radius: 8px; cursor: pointer; }
</style>
</head>
<body>
<div id="app">
  <div id="scene">
    <div id="status">Loading decimated_body.glb …</div>
    <div id="hint">drag to rotate · scroll to zoom · click a name to highlight</div>
  </div>
  <div id="side">
    <h2>Mesh names in file</h2>
    <div id="names"></div>
    <div id="inputrow">
      <input id="inp" placeholder="type a name to highlight" onkeydown="if(event.key==='Enter')highlightByText()">
      <button onclick="highlightByText()">Find</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script>
const sceneEl = document.getElementById('scene');
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, 1, 0.01, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
sceneEl.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff, 0.7));
const key = new THREE.DirectionalLight(0xffffff, 0.9); key.position.set(3, 5, 4); scene.add(key);
const rim = new THREE.DirectionalLight(0x6688ff, 0.4); rim.position.set(-4, 2, -3); scene.add(rim);

const root = new THREE.Group();
scene.add(root);

const meshes = []; // {name, mesh, baseColor}
let target = new THREE.Vector3();

const loader = new THREE.GLTFLoader();
loader.load('./decimated_body.glb', (gltf) => {
  root.add(gltf.scene);

  // walk the scene graph, collect every named mesh + count triangles
  let tris = 0;
  gltf.scene.traverse((o) => {
    if (o.isMesh) {
      o.material = new THREE.MeshStandardMaterial({ color: 0xb0453f, roughness: 0.6 });
      meshes.push({ name: o.name || '(unnamed)', mesh: o, baseColor: 0xb0453f });
      const g = o.geometry;
      tris += g.index ? g.index.count / 3 : g.attributes.position.count / 3;
    }
  });

  // center + frame the model (Z-Anatomy scale is unknown, so fit camera to bbox)
  const box = new THREE.Box3().setFromObject(gltf.scene);
  const size = box.getSize(new THREE.Vector3()).length();
  box.getCenter(target);
  camera.position.copy(target).add(new THREE.Vector3(0, 0, size * 1.2));
  camera.near = size / 100; camera.far = size * 10; camera.updateProjectionMatrix();
  camera.lookAt(target);

  // fill the name list
  const namesEl = document.getElementById('names');
  meshes.forEach((m) => {
    const d = document.createElement('div');
    d.textContent = m.name;
    d.onclick = () => highlight(m.name);
    namesEl.appendChild(d);
  });

  document.getElementById('status').textContent =
    `Loaded · ${meshes.length} mesh(es) · ~${Math.round(tris).toLocaleString()} triangles`;
  console.log('Mesh names:', meshes.map(m => m.name));
}, undefined, (err) => {
  document.getElementById('status').textContent = 'ERROR loading decimated_body.glb — see console. (Are you serving over http, not file://?)';
  console.error(err);
});

function highlight(name) {
  meshes.forEach((m) => {
    const on = m.name === name;
    m.mesh.material.color.setHex(on ? 0xffd23f : m.baseColor);
    m.mesh.material.opacity = on ? 1 : 0.25;
    m.mesh.material.transparent = !on;
  });
}
function highlightByText() {
  const t = document.getElementById('inp').value.trim().toLowerCase();
  const hit = meshes.find(m => m.name.toLowerCase().includes(t));
  if (hit) highlight(hit.name);
  else document.getElementById('status').textContent = `No mesh name contains "${t}"`;
}

// manual rotate/zoom (no OrbitControls dependency)
let dragging = false, px = 0, py = 0;
renderer.domElement.addEventListener('mousedown', e => { dragging = true; px = e.clientX; py = e.clientY; });
window.addEventListener('mouseup', () => dragging = false);
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  root.rotation.y += (e.clientX - px) * 0.01;
  root.rotation.x += (e.clientY - py) * 0.01;
  px = e.clientX; py = e.clientY;
});
renderer.domElement.addEventListener('wheel', e => {
  e.preventDefault();
  const dir = camera.position.clone().sub(target);
  dir.multiplyScalar(e.deltaY > 0 ? 1.1 : 0.9);
  camera.position.copy(target).add(dir);
}, { passive: false });

function resize() {
  const w = sceneEl.clientWidth, h = sceneEl.clientHeight;
  renderer.setSize(w, h); camera.aspect = w / h; camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize); resize();
(function loop() { requestAnimationFrame(loop); renderer.render(scene, camera); })();
</script>
</body>
</html>
